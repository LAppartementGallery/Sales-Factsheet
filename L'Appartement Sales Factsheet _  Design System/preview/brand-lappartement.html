<!doctype html>
<!-- @dsCard group="Brand" name="L'Appartement wordmark" subtitle="Top-left header on biography + work pages" viewport="700x200" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brand — L'Appartement logo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; background: #fafaf8; font-family: 'Inter', system-ui, sans-serif; color: #010101; }
  .card { width: 700px; padding: 26px 32px 30px; box-sizing: border-box; }
  .tile { background: #fff; box-shadow: 0 0 0 1px #ece8e0; padding: 34px 26px; display: flex; flex-direction: column; align-items: flex-start; }
  /* Real print size — 35mm wide ≈ 132px at 96dpi. */
  .tile img { width: 35mm; height: auto; display: block; }
  .lbl { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: #8a847d; font-weight: 500; margin-top: 22px; }
  .lbl strong { color: #010101; font-weight: 600; letter-spacing: 0.16em; }
  .desc { font-size: 11.5px; color: #4a4641; line-height: 1.55; margin-top: 8px; max-width: 520px; }
</style>
</head>
<body>
<div class="card">
  <div class="tile">
    <img src="../assets/logos/lappartement.svg" alt="L'Appartement">
    <div class="lbl"><strong>Black · 35 mm wide</strong> · biography + work pages, top-left</div>
    <div class="desc">Running header on the bio and work pages. Never recoloured, never on a tinted background. Sits flush to the page's 12 mm margin.</div>
  </div>
</div>
</body>
</html>
