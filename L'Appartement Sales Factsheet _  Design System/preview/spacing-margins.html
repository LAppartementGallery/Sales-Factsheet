<!doctype html>
<!-- @dsCard group="Spacing" name="A4 margins" subtitle="210 × 297 mm · ≈12 mm baseline, 14–18 mm typical" viewport="700x290" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing — A4 margins</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; background: #fafaf8; font-family: 'Inter', system-ui, sans-serif; color: #010101; }
  .card { width: 700px; padding: 24px 32px 28px; box-sizing: border-box; display: grid; grid-template-columns: 200px 1fr; gap: 30px; align-items: center; }
  .page {
    width: 180px; aspect-ratio: 210 / 297;
    background: #fff;
    position: relative;
    box-shadow: 0 0 0 1px #ece8e0;
  }
  .margin {
    position: absolute;
    inset: 4%; /* ≈ 12mm of 297mm */
    border: 1px dashed #c9c2b6;
  }
  .text-stub {
    position: absolute; inset: 4% 4% 4% 4%;
    background: linear-gradient(180deg, #f4f0e9 50%, transparent 50%);
    background-size: 100% 8px;
    opacity: 0.4;
  }
  .lbl-h { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: #8a847d; font-weight: 500; margin-bottom: 10px; }
  ul { margin: 0; padding-left: 16px; font-size: 11.5px; line-height: 1.65; color: #4a4641; }
  ul strong { color: #010101; font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <div class="page">
    <div class="margin"></div>
    <div class="text-stub"></div>
  </div>
  <div>
    <div class="lbl-h">A4 portrait · 210 × 297 mm</div>
    <ul>
      <li>Uniform margin across all pages <strong>12 mm</strong></li>
      <li>No variation by page type — every page uses the same outer frame</li>
      <li>Text wrap inset around floated objects <strong>25 px</strong></li>
      <li>Bio name lockup wrap inset <strong>30 px</strong></li>
    </ul>
  </div>
</div>
</body>
</html>
