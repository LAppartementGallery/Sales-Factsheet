<!doctype html>
<!-- @dsCard group="Components" name="Commercial sheet (fiche)" subtitle="Below the work · with price + without price" viewport="700x220" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Component — Fiche</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'Ivy Mode';
    src: url('../fonts/IvyMode-Regular.ttf') format('truetype');
    font-weight: 400; font-style: normal;
  }
  html, body { margin: 0; background: #fafaf8; font-family: 'Inter', system-ui, sans-serif; color: #010101; }
  .card { width: 700px; padding: 26px 32px 30px; box-sizing: border-box; display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }

  .lbl { font-size: 9.5px; letter-spacing: 0.16em; text-transform: uppercase; color: #8a847d; font-weight: 500; margin-bottom: 18px; }

  .fiche { color: #010101; }

  /* Artist lockup — Inter Thin + Ivy Mode, uppercase. Only line that's larger. */
  .artist {
    text-transform: uppercase;
    letter-spacing: 0.02em;
    line-height: 1;
    font-size: 21px;
    display: flex; align-items: baseline; gap: 8px;
  }
  .artist .first { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-weight: 200; }
  .artist .last  { font-family: 'Ivy Mode', 'Times New Roman', serif;  font-weight: 400; letter-spacing: 0.005em; }

  /* Art info — ALL one size, one weight (Inter Light). Hierarchy through
     spacing only, never through size or weight variation. */
  .info {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 15px;
    line-height: 1.4;
    margin-top: 10px;
  }
  .info .line { display: block; }
  .info .block-gap { margin-top: 14px; }   /* blank line before medium */

  /* Price — slightly bold across the WHOLE line. Uniform weight, no mixing. */
  .price {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 15px;
    margin-top: 20px;
    letter-spacing: -0.005em;
  }
  .price .currency {
    font-size: 0.6em;
    vertical-align: super;
    font-weight: 500;
    margin-left: 3px;
    letter-spacing: 0.04em;
  }
  .price .label {
    font-weight: 500;
    margin-right: 6px;
  }
</style>
</head>
<body>
<div class="card">
  <div>
    <div class="lbl">Without price · default</div>
    <div class="fiche">
      <div class="artist"><span class="first">Mohammed</span><span class="last">Sami</span></div>
      <div class="info">
        <span class="line">The Palace, 2023</span>
        <span class="line block-gap">Mixed Media on linen</span>
        <span class="line">280 x 385 cm</span>
      </div>
    </div>
  </div>
  <div>
    <div class="lbl">With price · superscript currency</div>
    <div class="fiche">
      <div class="artist"><span class="first">Mohammed</span><span class="last">Sami</span></div>
      <div class="info">
        <span class="line">The Palace, 2023</span>
        <span class="line block-gap">Mixed Media on linen</span>
        <span class="line">280 x 385 cm</span>
        <span class="line">110 ¼ x 151 ½ in</span>
      </div>
      <div class="price"><span class="label">Price (excl. VAT):</span>430,200<span class="currency">USD</span></div>
    </div>
  </div>
</div>
</body>
</html>
