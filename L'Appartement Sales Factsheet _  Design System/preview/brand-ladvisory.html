<!doctype html>
<!-- @dsCard group="Brand" name="L'Advisory wordmark" subtitle="Black on cover · beige #CEC2BA on end page" viewport="700x280" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brand — L'Advisory logo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; background: #fafaf8; font-family: 'Inter', system-ui, sans-serif; color: #010101; }
  .card { width: 700px; padding: 22px 32px 28px; box-sizing: border-box; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .tile {
    padding: 36px 28px 32px;
    min-height: 180px;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    gap: 22px;
  }
  .tile.light { background: #fff; box-shadow: 0 0 0 1px #ece8e0; }
  .tile.beige { background: #ffffff; box-shadow: 0 0 0 1px #ece8e0; }
  .tile img { width: 100%; max-width: 320px; height: auto; display: block; }
  .lbl { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: #8a847d; font-weight: 500; align-self: stretch; text-align: center; }
  .lbl strong { color: #010101; font-weight: 600; letter-spacing: 0.16em; }
</style>
</head>
<body>
<div class="card">
  <div class="tile light">
    <img src="../assets/logos/ladvisory.svg" alt="L'Advisory">
    <div class="lbl"><strong>Black</strong> · cover, top centre</div>
  </div>
  <div class="tile beige">
    <img src="../assets/logos/ladvisory-beige.svg" alt="L'Advisory beige">
    <div class="lbl"><strong>Beige #CEC2BA</strong> · end page only</div>
  </div>
</div>
</body>
</html>
