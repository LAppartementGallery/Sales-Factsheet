<!doctype html>
<!-- @dsCard group="Slides" name="Slide · Quote" subtitle="Page 3 — accent background + Ivy Mode quotation marks" viewport="870x1180" -->
<!--
  L'Advisory slide template — QUOTE (page 3).
  White background, Ivy Mode marks + drop-capped body, signature lockup
  right-aligned to text column.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Quote — Jean Arp</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'Ivy Mode';
    src: url('../fonts/IvyMode-Regular.ttf') format('truetype');
    font-weight: 400; font-style: normal;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  @page { size: A4 portrait; margin: 0; }
  html, body {
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    color: #010101; background: #ece8e0;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  body { display: flex; justify-content: center; padding: 0; }

  .page {
    width: 210mm; height: 297mm;
    position: relative; overflow: hidden;
    background: #ffffff;          /* white, not accent */
    color: #010101;
    box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.06);
  }

  /* Text block — centered vertically, wide column. */
  .quote-block {
    position: absolute;
    top: 38%;
    left: 32mm; right: 32mm;
  }

  /* Open mark — pushed out to the left, close above the text block. */
  .open-mark {
    font-family: 'Ivy Mode', 'Times New Roman', serif;
    font-size: 220pt;
    line-height: 0.55;
    position: absolute;
    top: -16mm;
    left: -28mm;
    color: #010101;
  }

  /* Quote body — Ivy Mode, justified with last line flush left, drop cap. */
  .quote-body {
    font-family: 'Ivy Mode', 'Times New Roman', serif;
    font-weight: 400;
    font-size: 32pt;
    line-height: 1.18;
    letter-spacing: -0.005em;
    color: #010101;
    margin: 0;
    text-align: justify;
    text-align-last: left;
  }
  .quote-body::first-letter {
    font-family: 'Ivy Mode', 'Times New Roman', serif;
    font-size: 110pt;
    line-height: 0.92;
    float: left;
    padding-right: 4mm;
    padding-top: 1mm;
    font-weight: 400;
  }

  /* Close mark — pushed out to the right, higher (closer to text). */
  .close-mark {
    font-family: 'Ivy Mode', 'Times New Roman', serif;
    font-size: 220pt;
    line-height: 0.55;
    position: absolute;
    bottom: -16mm;
    right: -28mm;
    transform: rotate(180deg);
    color: #010101;
  }

  /* Signature — aligned to the right edge of the text column, higher up. */
  .signature {
    position: absolute;
    right: 0;
    bottom: -38mm;
    display: flex; align-items: baseline; gap: 1.5mm;
    text-transform: uppercase;
    color: #010101;
  }
  .signature .dash  { font-family: 'Inter', sans-serif; font-weight: 200; font-size: 11pt; letter-spacing: 0.04em; margin-right: 2mm; }
  .signature .first { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-weight: 200; font-size: 11pt; letter-spacing: 0.05em; }
  .signature .last  { font-family: 'Ivy Mode', 'Times New Roman', serif;  font-weight: 400; font-size: 11pt; letter-spacing: 0.01em; }

  @media print { body { background: #fff; padding: 0; } .page { box-shadow: none; } }
</style>
</head>
<body>
<section class="page">
  <div class="quote-block">
    <span class="open-mark">&ldquo;</span>
    <p class="quote-body">Art is a fruit that grows in man, like a fruit on a plant, or a child in its mother's womb.</p>
    <span class="close-mark">&ldquo;</span>
    <div class="signature">
      <span class="dash">—</span><span class="first">Jean</span><span class="last">Arp</span>
    </div>
  </div>
</section>
</body>
</html>
