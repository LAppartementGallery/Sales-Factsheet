<!doctype html>
<!-- @dsCard group="Components" name="Commercial sheet (fiche)" subtitle="Below the work, page 1 · with price + without price" viewport="700x230" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Component — Fiche</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; background: #fafaf8; font-family: 'Inter', system-ui, sans-serif; color: #010101; }
  .card { width: 700px; padding: 30px 36px 34px; box-sizing: border-box; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
  .lbl { font-size: 9.5px; letter-spacing: 0.16em; text-transform: uppercase; color: #8a847d; font-weight: 500; margin-bottom: 18px; }

  /* Fiche — every line is Inter Light. Hierarchy through spacing only, never
     through size or weight, except the price line (Medium). */
  .fiche .artist { font-size: 17px; font-weight: 300; letter-spacing: 0.01em; line-height: 1.15; }
  .fiche .title  { font-size: 13.5px; font-style: italic; font-weight: 300; line-height: 1.4; margin-top: 4px; }
  .fiche .meta   { font-size: 12.5px; font-weight: 300; line-height: 1.5; margin-top: 9px; }
  .fiche .meta .dim { display: block; }
  .fiche .price  { font-size: 12.5px; font-weight: 500; letter-spacing: 0.005em; margin-top: 16px; }
</style>
</head>
<body>
<div class="card">
  <div>
    <div class="lbl">Without price</div>
    <div class="fiche">
      <div class="artist">Danielle Mckinney</div>
      <div class="title">Tell Me More, 2021</div>
      <div class="meta">
        <span class="dim">Acrylic on canvas</span>
        <span class="dim">61 × 45.7 cm</span>
        <span class="dim">24 × 18 in</span>
      </div>
    </div>
  </div>
  <div>
    <div class="lbl">With price · Swiss apostrophe separator</div>
    <div class="fiche">
      <div class="artist">Danielle Mckinney</div>
      <div class="title">Tell Me More, 2021</div>
      <div class="meta">
        <span class="dim">Acrylic on canvas</span>
        <span class="dim">61 × 45.7 cm</span>
        <span class="dim">24 × 18 in</span>
      </div>
      <div class="price">Price (excl. VAT): 400&rsquo;000 USD</div>
    </div>
  </div>
</div>
</body>
</html>
