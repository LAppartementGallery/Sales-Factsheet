<!doctype html>
<!-- @dsCard group="Colors" name="Placeholder greys" subtitle="Shown until a real photograph is dropped into a figure slot" viewport="700x200" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — Placeholder greys</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; background: #fafaf8; font-family: 'Inter', system-ui, sans-serif; color: #010101; }
  .card { width: 700px; padding: 26px 32px 30px; box-sizing: border-box; display: grid; grid-template-columns: 1.1fr 1fr; gap: 30px; align-items: center; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .sw { display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 56px; box-shadow: inset 0 0 0 1px rgba(1,1,1,.10); }
  .nm { font-size: 11px; font-weight: 600; }
  .hex { font-size: 10.5px; color: #5a5651; text-transform: uppercase; letter-spacing: 0.04em; }
  .demo { background: #e9e7e3; outline: 1px dashed #d3cfc8; outline-offset: -1px; color: #9a948b; text-align: center; padding: 22px 16px; }
  .demo .t { font-size: 9px; font-weight: 600; letter-spacing: 0.26em; text-transform: uppercase; }
  .demo .n { font-size: 9px; line-height: 1.6; margin-top: 8px; }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="sw"><div class="chip" style="background:#e9e7e3"></div><div class="nm">Fill</div><div class="hex">#E9E7E3</div></div>
    <div class="sw"><div class="chip" style="background:#9a948b"></div><div class="nm">Text</div><div class="hex">#9A948B</div></div>
    <div class="sw"><div class="chip" style="background:#d3cfc8"></div><div class="nm">Border</div><div class="hex">#D3CFC8</div></div>
  </div>
  <div class="demo">
    <div class="t">Additional View</div>
    <div class="n">One image, centred on the page.</div>
  </div>
</div>
</body>
</html>
