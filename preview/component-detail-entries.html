<!doctype html>
<!-- @dsCard group="Components" name="Provenance & location" subtitle="Page 2 · institution names set bold, left-aligned to the margin" viewport="700x230" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Component — Provenance & location</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; background: #fafaf8; font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; color: #010101; }
  .card { width: 760px; padding: 30px 36px 36px; box-sizing: border-box; display: grid; grid-template-columns: 1fr 1fr; gap: 48px; }

  /* Page-2 heading — Inter Light, same size as the fiche artist line (12pt),
     sentence case. No second typeface, no caps, no rule beneath. */
  h2 {
    font-size: 16px;
    font-weight: 300;
    letter-spacing: 0.01em;
    line-height: 1.15;
    margin: 0 0 14px;
    color: #010101;
  }
  .entry {
    font-size: 12.5px;
    font-weight: 300;
    line-height: 1.5;
    margin-bottom: 3px;
    color: #010101;
  }
  .entry strong { font-weight: 500; }
</style>
</head>
<body>
<div class="card">
  <div>
    <h2>Provenance</h2>
    <div class="entry"><strong>Marianne Boesky Gallery</strong>, New York, USA</div>
    <div class="entry">Private Collection, USA</div>
  </div>
  <div>
    <h2>Current Location of the Artwork</h2>
    <div class="entry">Delaware Freeport, Newark, DE 19711, United States</div>
  </div>
</div>
</body>
</html>
